<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Rainbow Unicorn</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #2a1050 0%, #4a2080 50%, #7030a0 100%);
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
    }

    .back {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #F0C0FF;
      text-decoration: none;
      font-size: 0.9rem;
      z-index: 10;
    }

    .back:hover { color: #fff; }

    header {
      text-align: center;
      padding: 16px 16px 4px;
    }

    header h1 {
      font-size: 2rem;
      background: linear-gradient(90deg, #ff5f5f, #ffb05a, #ffe75a, #7ee66b, #5abfff, #b06bff, #ff5fd2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header p {
      color: #d0b0e8;
      margin-top: 2px;
      font-size: 0.9rem;
    }

    #game-wrapper {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    canvas {
      border: 3px solid #8048b0;
      border-radius: 8px;
      background: #1a0830;
      max-width: 95vw;
      max-height: 72vh;
      box-shadow: 0 0 30px rgba(200, 120, 255, 0.35);
    }

    /* Mobile controls */
    #mobile-controls {
      display: none;
      margin-top: 12px;
      justify-content: center;
      align-items: center;
    }

    .dpad {
      display: grid;
      gap: 4px;
      grid-template-columns: 56px 56px 56px;
      grid-template-rows: 56px 56px;
    }

    .dpad .blank { visibility: hidden; }

    #mobile-controls button {
      width: 56px;
      height: 56px;
      font-size: 1.5rem;
      border: none;
      border-radius: 12px;
      background: rgba(128, 72, 176, 0.6);
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
    }

    #mobile-controls button:active,
    #mobile-controls button.pressed {
      background: #ff5fd2;
    }

    @media (pointer: coarse) {
      #mobile-controls { display: flex; }
    }

    footer {
      margin-top: auto;
      padding: 12px;
      font-size: 0.8rem;
      color: #6a4a8a;
    }
  </style>
</head>
<body>

<a class="back" href="../">&larr; Home</a>

<header>
  <h1>Rainbow Unicorn</h1>
  <p>Arrow keys or WASD move the unicorn &amp; cat together &mdash; Dodge the hearts &mdash; Reach the princess!</p>
</header>

<div id="game-wrapper">
  <canvas id="game" width="800" height="520"></canvas>

  <div id="mobile-controls">
    <div class="dpad">
      <div class="blank"></div>
      <button id="btn-up" aria-label="Up">&#9650;</button>
      <div class="blank"></div>
      <button id="btn-left" aria-label="Left">&#9664;</button>
      <button id="btn-down" aria-label="Down">&#9660;</button>
      <button id="btn-right" aria-label="Right">&#9654;</button>
    </div>
  </div>
</div>

<footer>&copy; 2026 Johnson Family</footer>

<script src="game.js"></script>
</body>
</html>
