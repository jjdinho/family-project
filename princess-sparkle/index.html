<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Princess Sparkle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 40%, #3a2060 100%);
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== CASTLE BACKGROUND ===== */
    #castle-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    #castle-bg canvas {
      width: 100%;
      height: 100%;
    }

    header, .princesses, footer, .back {
      position: relative;
      z-index: 1;
    }

    header {
      text-align: center;
      padding: 32px 16px 8px;
    }

    header h1 {
      font-size: 2.4rem;
      background: linear-gradient(90deg, #F0A0D0, #D060D0, #80B0FF, #F0A0D0);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      letter-spacing: 3px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    header p {
      color: #B090CC;
      margin-top: 4px;
      font-size: 1rem;
    }

    .back {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #B090CC;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back:hover { color: #eee; }

    /* ----- princess grid ----- */
    .princesses {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 28px;
      padding: 32px 20px 48px;
      max-width: 1000px;
    }

    .princess-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 160px;
    }

    /* ----- princess figure (CSS art) ----- */
    .figure {
      position: relative;
      width: 120px;
      height: 190px;
    }

    /* crown */
    .crown {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 16px;
      display: flex;
      justify-content: center;
      gap: 3px;
    }

    .crown span {
      display: block;
      width: 6px;
      height: 16px;
      background: #FFD700;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    .crown::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -2px;
      right: -2px;
      height: 5px;
      background: #FFD700;
      border-radius: 1px;
    }

    /* head */
    .head {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 36px;
      background: #FDDCB5;
      border-radius: 50%;
    }

    /* eyes */
    .head::before {
      content: '';
      position: absolute;
      top: 14px;
      left: 7px;
      width: 5px;
      height: 5px;
      background: #333;
      border-radius: 50%;
      box-shadow: 13px 0 0 #333;
    }

    /* smile */
    .head::after {
      content: '';
      position: absolute;
      top: 22px;
      left: 50%;
      transform: translateX(-50%);
      width: 10px;
      height: 5px;
      border-bottom: 2px solid #D4878F;
      border-radius: 0 0 50% 50%;
    }

    /* hair */
    .hair {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: 38px;
      height: 22px;
      border-radius: 50% 50% 0 0;
    }

    /* body */
    .torso {
      position: absolute;
      top: 55px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 20px;
      border-radius: 4px 4px 0 0;
    }

    /* dress */
    .dress {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 110px;
      clip-path: polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%);
      border-radius: 0 0 8px 8px;
    }

    /* dress shine overlay */
    .dress::after {
      content: '';
      position: absolute;
      top: 0;
      left: 30%;
      width: 20%;
      height: 100%;
      background: rgba(255,255,255,0.1);
      clip-path: polygon(20% 0%, 80% 0%, 60% 100%, 0% 100%);
    }

    /* sleeves */
    .sleeve-l, .sleeve-r {
      position: absolute;
      top: 58px;
      width: 14px;
      height: 22px;
      border-radius: 6px;
    }
    .sleeve-l { left: 22px; transform: rotate(15deg); }
    .sleeve-r { right: 22px; transform: rotate(-15deg); }

    /* ----- name & button ----- */
    .princess-name {
      margin-top: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .sparkle-btn {
      margin-top: 8px;
      padding: 8px 22px;
      border: none;
      border-radius: 20px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      color: #fff;
      letter-spacing: 1px;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .sparkle-btn:hover {
      transform: scale(1.08);
    }

    .sparkle-btn:active {
      transform: scale(0.95);
    }

    /* ----- sparkle particle ----- */
    .sparkle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: sparkle-fly 0.9s ease-out forwards;
    }

    @keyframes sparkle-fly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0);
      }
    }

    /* star-shaped sparkles */
    .sparkle-star {
      position: fixed;
      pointer-events: none;
      font-size: 16px;
      animation: sparkle-star-fly 1.1s ease-out forwards;
    }

    @keyframes sparkle-star-fly {
      0% {
        opacity: 1;
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translate(var(--tx), var(--ty)) scale(0.3) rotate(180deg);
      }
    }

    /* ===== UNICORN ===== */
    .unicorn-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 20px 32px;
      position: relative;
      z-index: 1;
    }

    .unicorn-label {
      font-size: 1.4rem;
      font-weight: bold;
      background: linear-gradient(90deg, #FF0000, #FF8800, #FFD700, #44CC44, #3399FF, #8844DD, #FF0000);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
      margin-bottom: 8px;
    }

    .unicorn-subtitle {
      color: #B090CC;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }

    .unicorn {
      position: relative;
      width: 220px;
      height: 200px;
      cursor: pointer;
    }

    /* horn */
    .u-horn {
      position: absolute;
      top: 0;
      left: 88px;
      width: 12px;
      height: 45px;
      background: linear-gradient(180deg, #FFD700, #FFA500);
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      transform: rotate(-5deg);
    }

    .u-horn::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 2px;
      width: 8px;
      height: 35px;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.3) 0px,
        rgba(255,255,255,0.3) 3px,
        transparent 3px,
        transparent 6px
      );
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    }

    /* ear */
    .u-ear {
      position: absolute;
      top: 32px;
      left: 100px;
      width: 12px;
      height: 20px;
      background: #F0E8F0;
      border-radius: 50% 50% 20% 20%;
      transform: rotate(15deg);
    }

    /* mane (rainbow!) */
    .u-mane {
      position: absolute;
      top: 28px;
      left: 95px;
      width: 40px;
      height: 65px;
      overflow: hidden;
    }

    .u-mane-strand {
      position: absolute;
      width: 10px;
      border-radius: 0 0 8px 8px;
    }

    /* head */
    .u-head {
      position: absolute;
      top: 38px;
      left: 62px;
      width: 48px;
      height: 40px;
      background: #FFFFFF;
      border-radius: 50% 40% 40% 50%;
    }

    /* snout */
    .u-snout {
      position: absolute;
      top: 55px;
      left: 48px;
      width: 28px;
      height: 22px;
      background: #F8F0F8;
      border-radius: 50%;
    }

    /* nostril */
    .u-snout::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 5px;
      width: 5px;
      height: 4px;
      background: #DDCCDD;
      border-radius: 50%;
    }

    /* eye */
    .u-eye {
      position: absolute;
      top: 48px;
      left: 76px;
      width: 10px;
      height: 12px;
      background: #2A1A3A;
      border-radius: 50%;
    }

    .u-eye::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 3px;
      width: 4px;
      height: 4px;
      background: #FFFFFF;
      border-radius: 50%;
    }

    /* body */
    .u-body {
      position: absolute;
      top: 72px;
      left: 70px;
      width: 100px;
      height: 65px;
      background: #FFFFFF;
      border-radius: 50% 45% 40% 45%;
    }

    /* legs */
    .u-leg {
      position: absolute;
      bottom: 10px;
      width: 14px;
      height: 50px;
      background: #FFFFFF;
      border-radius: 4px 4px 6px 6px;
    }

    .u-leg::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: -1px;
      width: 16px;
      height: 8px;
      background: #E8D8F0;
      border-radius: 3px;
    }

    .u-leg-fl { left: 78px; }
    .u-leg-fr { left: 98px; }
    .u-leg-bl { left: 138px; }
    .u-leg-br { left: 155px; }

    /* tail (rainbow!) */
    .u-tail {
      position: absolute;
      top: 65px;
      left: 162px;
      width: 50px;
      height: 70px;
      overflow: visible;
    }

    .u-tail-strand {
      position: absolute;
      left: 0;
      width: 8px;
      border-radius: 0 0 12px 12px;
    }

    footer {
      margin-top: auto;
      padding: 16px;
      font-size: 0.8rem;
      color: #443366;
    }
  </style>
</head>

<script>
// ===== CASTLE BACKGROUND WITH PINK SPARKLES =====
(function () {
  const c = document.getElementById("castle-canvas");
  const ctx = c.getContext("2d");
  let W, H;
  const sparkles = [];

  function resize() {
    W = c.width = window.innerWidth;
    H = c.height = window.innerHeight;
    drawCastle();
  }

  function drawCastle() {
    // night sky
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, "#0D0620");
    sky.addColorStop(0.4, "#1a0a2e");
    sky.addColorStop(1, "#2d1b4e");
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // stars
    ctx.fillStyle = "#FFFFFF";
    for (let i = 0; i < 60; i++) {
      const sx = ((i * 137.5) + 50) % W;
      const sy = ((i * 97.3) + 20) % (H * 0.4);
      const sr = 0.5 + (i % 3) * 0.5;
      ctx.globalAlpha = 0.3 + (i % 5) * 0.12;
      ctx.beginPath();
      ctx.arc(sx, sy, sr, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // moon
    ctx.fillStyle = "#F0E8D8";
    ctx.beginPath();
    ctx.arc(W * 0.8, H * 0.1, 30, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#E8DCC8";
    ctx.beginPath();
    ctx.arc(W * 0.8 + 6, H * 0.1 - 3, 28, 0, Math.PI * 2);
    ctx.fill();
    // moon glow
    ctx.fillStyle = "rgba(240,232,216,0.06)";
    ctx.beginPath();
    ctx.arc(W * 0.8, H * 0.1, 60, 0, Math.PI * 2);
    ctx.fill();

    const cx = W / 2; // castle center
    const base = H * 0.95; // ground line
    const cw = Math.min(W * 0.6, 500); // castle width

    // ground / hill
    ctx.fillStyle = "#1E1040";
    ctx.beginPath();
    ctx.ellipse(cx, base, cw * 0.9, H * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();

    const wallL = cx - cw / 2;
    const wallR = cx + cw / 2;
    const wallTop = base - cw * 0.55;
    const wallH = base - wallTop;

    // main wall
    ctx.fillStyle = "#3D2860";
    ctx.fillRect(wallL + cw * 0.15, wallTop + cw * 0.12, cw * 0.7, wallH - cw * 0.12);

    // wall texture (stone lines)
    ctx.strokeStyle = "rgba(80,50,120,0.3)";
    ctx.lineWidth = 1;
    for (let row = 0; row < 8; row++) {
      const ry = wallTop + cw * 0.15 + row * (wallH / 9);
      ctx.beginPath();
      ctx.moveTo(wallL + cw * 0.15, ry);
      ctx.lineTo(wallR - cw * 0.15, ry);
      ctx.stroke();
      // vertical joints (offset every other row)
      const off = (row % 2) * cw * 0.06;
      for (let col = 0; col < 6; col++) {
        const jx = wallL + cw * 0.2 + col * cw * 0.1 + off;
        if (jx < wallR - cw * 0.15) {
          ctx.beginPath();
          ctx.moveTo(jx, ry);
          ctx.lineTo(jx, ry + wallH / 9);
          ctx.stroke();
        }
      }
    }

    // gate
    const gateW = cw * 0.16;
    const gateH = cw * 0.25;
    ctx.fillStyle = "#1A0A20";
    ctx.beginPath();
    ctx.moveTo(cx - gateW / 2, base);
    ctx.lineTo(cx - gateW / 2, base - gateH + gateW / 2);
    ctx.arc(cx, base - gateH + gateW / 2, gateW / 2, Math.PI, 0);
    ctx.lineTo(cx + gateW / 2, base);
    ctx.fill();

    // gate trim
    ctx.strokeStyle = "#6A40A0";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - gateW / 2, base);
    ctx.lineTo(cx - gateW / 2, base - gateH + gateW / 2);
    ctx.arc(cx, base - gateH + gateW / 2, gateW / 2, Math.PI, 0);
    ctx.lineTo(cx + gateW / 2, base);
    ctx.stroke();

    // windows
    ctx.fillStyle = "#F0D060";
    ctx.globalAlpha = 0.7;
    const winW = cw * 0.05;
    const winH = cw * 0.07;
    const winY = wallTop + cw * 0.22;
    [-0.2, -0.08, 0.08, 0.2].forEach(off => {
      const wx = cx + cw * off - winW / 2;
      ctx.beginPath();
      ctx.moveTo(wx, winY + winH);
      ctx.lineTo(wx, winY + winW / 2);
      ctx.arc(wx + winW / 2, winY + winW / 2, winW / 2, Math.PI, 0);
      ctx.lineTo(wx + winW, winY + winH);
      ctx.fill();
    });
    // upper windows
    const winY2 = wallTop + cw * 0.08;
    [-0.12, 0.12].forEach(off => {
      const wx = cx + cw * off - winW / 2;
      ctx.beginPath();
      ctx.moveTo(wx, winY2 + winH);
      ctx.lineTo(wx, winY2 + winW / 2);
      ctx.arc(wx + winW / 2, winY2 + winW / 2, winW / 2, Math.PI, 0);
      ctx.lineTo(wx + winW, winY2 + winH);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // window glow
    ctx.fillStyle = "rgba(240,208,96,0.08)";
    [-0.2, -0.08, 0.08, 0.2].forEach(off => {
      ctx.beginPath();
      ctx.arc(cx + cw * off, winY + winH / 2, cw * 0.04, 0, Math.PI * 2);
      ctx.fill();
    });

    // left tower
    drawTower(wallL + cw * 0.05, wallTop - cw * 0.15, cw * 0.14, cw * 0.6);
    // right tower
    drawTower(wallR - cw * 0.19, wallTop - cw * 0.15, cw * 0.14, cw * 0.6);
    // center tall tower
    drawTower(cx - cw * 0.08, wallTop - cw * 0.35, cw * 0.16, cw * 0.48);

    // battlements on main wall
    drawBattlements(wallL + cw * 0.15, wallTop + cw * 0.1, cw * 0.7);
  }

  function drawTower(x, top, w, h) {
    // tower body
    ctx.fillStyle = "#4A3070";
    ctx.fillRect(x, top + w * 0.6, w, h);

    // stone lines
    ctx.strokeStyle = "rgba(90,60,130,0.3)";
    ctx.lineWidth = 1;
    for (let row = 0; row < 6; row++) {
      const ry = top + w * 0.6 + row * (h / 7);
      ctx.beginPath();
      ctx.moveTo(x, ry);
      ctx.lineTo(x + w, ry);
      ctx.stroke();
    }

    // cone roof
    ctx.fillStyle = "#D050A0";
    ctx.beginPath();
    ctx.moveTo(x + w / 2, top);
    ctx.lineTo(x - w * 0.1, top + w * 0.65);
    ctx.lineTo(x + w * 1.1, top + w * 0.65);
    ctx.closePath();
    ctx.fill();

    // roof highlight
    ctx.fillStyle = "rgba(255,150,200,0.25)";
    ctx.beginPath();
    ctx.moveTo(x + w / 2, top);
    ctx.lineTo(x + w * 0.2, top + w * 0.65);
    ctx.lineTo(x + w * 0.45, top + w * 0.65);
    ctx.closePath();
    ctx.fill();

    // flag
    ctx.fillStyle = "#FF80C0";
    ctx.beginPath();
    ctx.moveTo(x + w / 2, top);
    ctx.lineTo(x + w / 2 + w * 0.4, top + w * 0.15);
    ctx.lineTo(x + w / 2, top + w * 0.3);
    ctx.fill();

    // tower window
    ctx.fillStyle = "rgba(240,208,96,0.6)";
    const twx = x + w * 0.3;
    const twy = top + w * 0.9;
    const tww = w * 0.4;
    const twh = w * 0.5;
    ctx.beginPath();
    ctx.moveTo(twx, twy + twh);
    ctx.lineTo(twx, twy + tww / 2);
    ctx.arc(twx + tww / 2, twy + tww / 2, tww / 2, Math.PI, 0);
    ctx.lineTo(twx + tww, twy + twh);
    ctx.fill();
  }

  function drawBattlements(x, y, w) {
    ctx.fillStyle = "#3D2860";
    const merlonW = w / 14;
    for (let i = 0; i < 7; i++) {
      ctx.fillRect(x + i * merlonW * 2, y - merlonW * 0.8, merlonW, merlonW * 0.8);
    }
  }

  // ===== PINK SPARKLES ON THE CASTLE =====
  function initSparkles() {
    const cx = W / 2;
    const cw = Math.min(W * 0.6, 500);
    const base = H * 0.95;
    const wallTop = base - cw * 0.55;

    for (let i = 0; i < 35; i++) {
      sparkles.push({
        x: cx - cw * 0.35 + Math.random() * cw * 0.7,
        y: wallTop - cw * 0.3 + Math.random() * (base - wallTop + cw * 0.3),
        size: 1.5 + Math.random() * 3,
        phase: Math.random() * Math.PI * 2,
        speed: 0.02 + Math.random() * 0.03,
        brightness: 0.4 + Math.random() * 0.6,
      });
    }
  }

  function animateSparkles() {
    // redraw castle then sparkles on top
    drawCastle();

    for (const s of sparkles) {
      s.phase += s.speed;
      const alpha = s.brightness * (0.3 + 0.7 * Math.abs(Math.sin(s.phase)));

      // glow
      ctx.fillStyle = `rgba(255,140,200,${alpha * 0.3})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
      ctx.fill();

      // core
      ctx.fillStyle = `rgba(255,180,220,${alpha})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();

      // white center
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.8})`;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size * 0.4, 0, Math.PI * 2);
      ctx.fill();

      // cross rays
      ctx.strokeStyle = `rgba(255,180,220,${alpha * 0.5})`;
      ctx.lineWidth = 0.8;
      const r = s.size * 2.5;
      ctx.beginPath();
      ctx.moveTo(s.x - r, s.y);
      ctx.lineTo(s.x + r, s.y);
      ctx.moveTo(s.x, s.y - r);
      ctx.lineTo(s.x, s.y + r);
      ctx.stroke();
    }

    requestAnimationFrame(animateSparkles);
  }

  window.addEventListener("resize", () => { resize(); sparkles.length = 0; initSparkles(); });
  resize();
  initSparkles();
  animateSparkles();
})();

// ===== ROSIE'S SPARKLY BED =====
(function () {
  const bc = document.getElementById("bed-canvas");
  if (!bc) return;
  const bctx = bc.getContext("2d");
  const bW = bc.width;
  const bH = bc.height;
  const bedSparkles = [];
  const rainbow = ["#FF0000","#FF8800","#FFD700","#44CC44","#3399FF","#8844DD","#DD44AA","#FF69B4"];

  // bed shape: an oval cushion under the unicorn
  const bedCx = bW / 2 + 10;
  const bedCy = bH - 35;
  const bedRx = 120;
  const bedRy = 28;

  // generate sparkles across the bed surface
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const rx = Math.random() * bedRx * 0.9;
    const ry = Math.random() * bedRy * 0.9;
    bedSparkles.push({
      x: bedCx + Math.cos(angle) * rx,
      y: bedCy + Math.sin(angle) * ry,
      size: 1 + Math.random() * 2.5,
      phase: Math.random() * Math.PI * 2,
      speed: 0.025 + Math.random() * 0.035,
      color: rainbow[Math.floor(Math.random() * rainbow.length)],
    });
  }

  function drawBed() {
    bctx.clearRect(0, 0, bW, bH);

    // bed cushion
    bctx.fillStyle = "#E8C0E8";
    bctx.beginPath();
    bctx.ellipse(bedCx, bedCy, bedRx, bedRy, 0, 0, Math.PI * 2);
    bctx.fill();

    // cushion rim / pillow edge
    bctx.strokeStyle = "#D0A0D0";
    bctx.lineWidth = 2;
    bctx.beginPath();
    bctx.ellipse(bedCx, bedCy, bedRx, bedRy, 0, 0, Math.PI * 2);
    bctx.stroke();

    // inner cushion highlight
    bctx.fillStyle = "rgba(255,220,255,0.35)";
    bctx.beginPath();
    bctx.ellipse(bedCx - 15, bedCy - 5, bedRx * 0.5, bedRy * 0.45, -0.2, 0, Math.PI * 2);
    bctx.fill();

    // pillow ruffle dots around edge
    bctx.fillStyle = "#D8A8D8";
    for (let a = 0; a < Math.PI * 2; a += 0.35) {
      const rx2 = bedRx + 3;
      const ry2 = bedRy + 2;
      bctx.beginPath();
      bctx.arc(bedCx + Math.cos(a) * rx2, bedCy + Math.sin(a) * ry2, 3, 0, Math.PI * 2);
      bctx.fill();
    }

    // animated sparkles
    for (const s of bedSparkles) {
      s.phase += s.speed;
      const alpha = 0.3 + 0.7 * Math.abs(Math.sin(s.phase));

      // glow
      bctx.fillStyle = s.color;
      bctx.globalAlpha = alpha * 0.2;
      bctx.beginPath();
      bctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
      bctx.fill();

      // core
      bctx.globalAlpha = alpha;
      bctx.beginPath();
      bctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      bctx.fill();

      // white center
      bctx.fillStyle = "#FFFFFF";
      bctx.globalAlpha = alpha * 0.7;
      bctx.beginPath();
      bctx.arc(s.x, s.y, s.size * 0.35, 0, Math.PI * 2);
      bctx.fill();

      // tiny cross rays
      bctx.strokeStyle = s.color;
      bctx.globalAlpha = alpha * 0.4;
      bctx.lineWidth = 0.6;
      const cr = s.size * 2;
      bctx.beginPath();
      bctx.moveTo(s.x - cr, s.y);
      bctx.lineTo(s.x + cr, s.y);
      bctx.moveTo(s.x, s.y - cr);
      bctx.lineTo(s.x, s.y + cr);
      bctx.stroke();
    }
    bctx.globalAlpha = 1;

    requestAnimationFrame(drawBed);
  }

  drawBed();
})();

// ===== UNICORN CLICK SPARKLES =====
document.querySelector(".unicorn").addEventListener("click", (e) => {
  const rainbow = ["#FF0000","#FF8800","#FFD700","#44CC44","#3399FF","#8844DD","#DD44AA"];
  const rect = e.currentTarget.getBoundingClientRect();
  const ox = rect.left + rect.width / 2;
  const oy = rect.top + rect.height / 2;

  for (let i = 0; i < 35; i++) {
    const color = rainbow[i % rainbow.length];
    const angle = Math.random() * Math.PI * 2;
    const dist = 50 + Math.random() * 120;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist - 40;

    if (Math.random() < 0.3) {
      const star = document.createElement("div");
      star.className = "sparkle-star";
      star.textContent = Math.random() < 0.5 ? "\u2728" : "\u2B50";
      star.style.left = (ox + (Math.random() - 0.5) * 60) + "px";
      star.style.top = (oy + (Math.random() - 0.5) * 40) + "px";
      star.style.setProperty("--tx", tx + "px");
      star.style.setProperty("--ty", ty + "px");
      star.style.animationDuration = (0.7 + Math.random() * 0.6) + "s";
      document.body.appendChild(star);
      star.addEventListener("animationend", () => star.remove());
    } else {
      const dot = document.createElement("div");
      dot.className = "sparkle";
      const size = 5 + Math.random() * 9;
      dot.style.width = size + "px";
      dot.style.height = size + "px";
      dot.style.background = Math.random() < 0.2 ? "#FFFFFF" : color;
      dot.style.boxShadow = `0 0 ${size + 2}px ${color}`;
      dot.style.left = (ox + (Math.random() - 0.5) * 80) + "px";
      dot.style.top = (oy + (Math.random() - 0.5) * 60) + "px";
      dot.style.setProperty("--tx", tx + "px");
      dot.style.setProperty("--ty", ty + "px");
      dot.style.animationDelay = (Math.random() * 0.15) + "s";
      dot.style.animationDuration = (0.6 + Math.random() * 0.5) + "s";
      document.body.appendChild(dot);
      dot.addEventListener("animationend", () => dot.remove());
    }
  }
});
